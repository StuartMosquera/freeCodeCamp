<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Form</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1 id="title">InnovaTech</h1>
    <h2>Survey Form</h2>
    <p id="description">Thank you for taking the time to help us improve our services</p>
  </header>
  <!-- Main -->
  <main>
    <form id="survey-form">
      <fieldset>
        <label id="name-label">Name</label>
        <input type="text" id="name" class="form-control border" placeholder="Enter your name" required>
        <label id="email-label">Email</label>
        <input type="email" id="email" class="form-control border" placeholder="Enter your Email" required>
        <label id="number-label">Age <span class="clue">(optional)</span></label>
        <input type="number" id="number" class="form-control border" min="10" max="99" placeholder="Age">
      </fieldset>
      <fieldset>
        <legend>Which option best describes your current role?</legend>
        <label>
          <select id="dropdown" class="form-control">
            <option disabled selected value="">(select an option)</option>
            <option value="student">Student</option>
            <option value="full-time-job">Full Time Job</option>
            <option value="prefer-not-to-say">Prefer not to say</option>
            <option value="other">Other</option>
          </select>
        </label>
      </fieldset>
      <fieldset>
        <legend>Would you recommend InnovaTech to a friend?</legend>
        <label><input type="radio" class="input-radio" name="selection" value="yes" checked>Yes</label>
        <label><input type="radio" class="input-radio" name="selection" value="no">No</label>
        <label><input type="radio" class="input-radio" name="selection" value="maybe">Maybe</label>
        <label><input type="radio" class="input-radio" name="selection" value="not-sure">Not sure</label>
      </fieldset>
      <fieldset>
        <legend>What service did you like the most? <span class="clue">(check all that apply)</span></legend>
        <label><input type="checkbox" class="input-checkbox" value="identity-design">Identity Design</label>
        <label><input type="checkbox" class="input-checkbox" value="social-media-design">Social Media Design</label>
        <label><input type="checkbox" class="input-checkbox" value="logo-design">Logo Design</label>
        <label><input type="checkbox" class="input-checkbox" value="website-development">Website Development</label>
      </fieldset> 
      <fieldset>
        <legend>Any comments or suggestions?</legend>
        <label><textarea class="textarea" placeholder="Enter your comments here..."></textarea></label>
      </fieldset>
      <button type="submit" id="submit">Submit</button>
    </form>
  </main> 
  <!-- Footer -->
  <footer>
    <p>Made by <a class="creator" href="https://github.com/StuartMosquera" target="_blank">Stuart Mosquera</a> | 2024</p>
  </footer> 
</body>
</html>
